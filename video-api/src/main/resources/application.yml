server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: video-api

  # 环境配置
  profiles:
    active: dev

  # 文件上传配置
  servlet:
    multipart:
      # 单个文件大小限制（分片上传不受此限制，因为分片走自定义接口）
      max-file-size: 50MB
      # 总上传大小限制
      max-request-size: 100MB

  # Jackson配置
  jackson:
    # 日期格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区
    time-zone: Asia/Shanghai
    # 忽略null字段
    default-property-inclusion: non_null
    # 下划线转驼峰
    property-naming-strategy: LOWER_CAMEL_CASE

# MyBatis-Plus配置
mybatis-plus:
  # Mapper XML位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.videoai.common.domain
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 打印SQL（开发环境）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: info
    com.videoai: debug
    # SQL日志
    com.videoai.infra.mysql.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 业务配置
videoai:
  upload:
    # 分片大小（字节）：5MB
    chunk-size: 5242880
    # 上传会话过期时间（小时）
    session-expire-hours: 24
    # 允许的文件类型
    allowed-types: mp4,avi,mov,mkv,wmv,flv
    # 最大文件大小（字节）：5GB
    max-file-size: 5368709120

  # 限流配置
  rate-limit:
    # 全局QPS限制
    global-qps: 1000
    # 单用户上传QPS限制
    user-upload-qps: 10
    # 单用户API QPS限制
    user-api-qps: 100