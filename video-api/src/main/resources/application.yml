server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: video-api

  # 环境配置
  profiles:
    active: dev

  # 文件上传配置
  servlet:
    multipart:
      # 单个文件大小限制（分片上传不受此限制，因为分片走自定义接口）
      max-file-size: 50MB
      # 总上传大小限制
      max-request-size: 100MB

  # Jackson配置
  jackson:
    # 日期格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区
    time-zone: Asia/Shanghai
    # 忽略null字段
    default-property-inclusion: non_null
    # 下划线转驼峰
    property-naming-strategy: LOWER_CAMEL_CASE

# MyBatis-Plus配置
mybatis-plus:
  # Mapper XML位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.videoai.common.domain
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 打印SQL（开发环境）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: info
    com.videoai: debug
    # SQL日志
    com.videoai.infra.mysql.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 业务配置
videoai:
  upload:
    # 分片大小（字节）：5MB
    chunk-size: 5242880
    # 上传会话过期时间（小时）
    session-expire-hours: 24
    # 允许的文件类型
    allowed-types: mp4,avi,mov,mkv,wmv,flv
    # 最大文件大小（字节）：5GB
    max-file-size: 5368709120

  # 限流配置
  rate-limit:
    # 全局QPS限制
    global-qps: 1000
    # 单用户上传QPS限制
    user-upload-qps: 10
    # 单用户API QPS限制
    user-api-qps: 100

---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/video_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123456
    # Druid连接池配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 开启SQL监控
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
      # 监控页面配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Kafka配置
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # 发送确认：all表示需要所有副本确认
      acks: all
      # 重试次数
      retries: 3
      # 批量发送大小
      batch-size: 16384
      # 批量发送延迟
      linger-ms: 5
      # 缓冲区大小
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: video-api-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# MinIO配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: video-ai

# AI服务配置
ai:
  claude:
    api-key: ${CLAUDE_API_KEY:your-api-key}
    base-url: https://api.anthropic.com
    model: claude-3-opus-20240229
    max-tokens: 4096
