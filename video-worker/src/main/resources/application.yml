server:
  port: 8081

spring:
  application:
    name: video-worker

  profiles:
    active: dev

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.videoai.common.domain
  configuration:
    map-underscore-to-camel-case: true

# Worker配置
videoai:
  worker:
    # 并发处理数
    concurrency: 5
    # 每秒最大AI请求数
    ai-qps-limit: 2
    # 单任务超时（分钟）
    task-timeout-minutes: 30

  # 视频处理配置
  video:
    # 抽帧间隔（秒）
    frame-interval: 2
    # 每帧最大宽度（像素）
    max-frame-width: 1280
    # 每帧最大高度（像素）
    max-frame-height: 720
    # 临时文件目录
    temp-dir: /tmp/videoai

# 日志配置
logging:
  level:
    root: info
    com.videoai: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"